<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM26 Wonderkids</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>FM26 Wonderkids Database</h1>

<input
id="search"
type="text"
placeholder="Cari nama pemain...">
<button id="toggleFilter" class="filter-toggle">
    Filter ▼
</button>
<div class="filterBox" id="filterBox">

<h3>Rating</h3>

<div id="ratingFilter" class="chips">

<button class="chip active" data-rating="">All</button>
<button class="chip" data-rating="5">★★★★★</button>
<button class="chip" data-rating="4">★★★★</button>
<button class="chip" data-rating="3">★★★</button>

</div>

<h3>Posisi</h3>

<div id="positionFilter" class="chips">

<button class="chip active" data-position="">All</button>

</div>

<h3>Negara</h3>

<select id="nation">

<option value="">Semua Negara</option>

</select>

</div>

</header>

<div class="stats">

    <div class="stat-card">
        <h3 id="totalPlayers">0</h3>
        <p>Pemain</p>
    </div>

    <div class="stat-card">
        <h3 id="totalCountries">0</h3>
        <p>Negara</p>
    </div>

    <div class="stat-card">
        <h3 id="totalClubs">0</h3>
        <p>Klub</p>
    </div>

    <div class="stat-card">
        <h3 id="resultCount">0 pemain ditemukan</h3>
    </div>

</div>

<div id="players" class="player-grid"></div>
  
<button id="backTop" class="backTop">
    ↑
</button>

  <nav class="bottom-nav">

<a href="index.html" class="nav-item active">

🏠

<span>Home</span>

</a>

⭐

<span>Favorit</span>

</a>

<a href="settings.html" class="nav-item">

⚙️

<span>Pengaturan</span>

</a>

  </nav>
  
<script src="js/utils.js"></script>
<script src="js/filter.js"></script>
<script src="js/favorites.js"></script>
<script src="js/ui.js"></script>
<script src="js/theme.js"></script>
<script src="js/app.js"></script>


</body>
</html>
